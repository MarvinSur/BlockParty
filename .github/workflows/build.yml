name: Build BlockParty

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 8 (Temurin + Maven cache)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # FIX: maven.timo.cloud 503 (repo mati permanen).
      # Download TimoCloud-API JAR langsung dari GitHub Releases
      # dan install ke local Maven repo supaya bisa di-resolve saat build.
      - name: Install TimoCloud-API to local Maven repo
        run: |
          curl -L \
            "https://github.com/TimoCloud/TimoCloud/releases/download/5.3.1/TimoCloud-API-5.3.1.jar" \
            -o TimoCloud-API-5.3.1.jar
          mvn install:install-file \
            -Dfile=TimoCloud-API-5.3.1.jar \
            -DgroupId=cloud.timo.TimoCloud \
            -DartifactId=TimoCloud-API \
            -Dversion=5.3.1 \
            -Dpackaging=jar \
            -DgeneratePom=true \
            -q

      - name: Build with Maven
        run: mvn -B --no-transfer-progress clean package -DskipTests

      - name: Collect final JAR
        run: |
          mkdir -p build-artifacts
          find . -maxdepth 2 -name "BlockParty-*.jar" -path "*/target/*" -exec cp {} build-artifacts/ \;
          if [ -z "$(ls -A build-artifacts)" ]; then
            find . -name "*.jar" -path "*/target/*" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -exec cp {} build-artifacts/ \;
          fi
          echo "=== Artifacts found ==="
          ls -lh build-artifacts/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockParty-${{ github.run_number }}
          path: build-artifacts/
          if-no-files-found: error
          retention-days: 7
