name: Build BlockParty

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 8 (Temurin + Maven cache)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B --no-transfer-progress clean package -DskipTests

      - name: Collect final JAR
        run: |
          mkdir -p build-artifacts
          find . -maxdepth 2 -name "BlockParty-*.jar" -path "*/target/*" -exec cp {} build-artifacts/ \;
          if [ -z "$(ls -A build-artifacts)" ]; then
            find . -name "*.jar" -path "*/target/*" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -exec cp {} build-artifacts/ \;
          fi
          echo "=== Artifacts found ==="
          ls -lh build-artifacts/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockParty-${{ github.run_number }}
          path: build-artifacts/
          if-no-files-found: error
          retention-days: 7
